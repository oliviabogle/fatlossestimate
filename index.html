<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fat Loss Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #0b0f1a;
      --surface: #111827;
      --card:    #1a2235;
      --border:  #1f2d45;
      --green:   #00e676;
      --green-dim: #00b359;
      --amber:   #ffb300;
      --red:     #ff4d4d;
      --text:    #e8edf5;
      --muted:   #6b7a99;
      --mono:    'JetBrains Mono', monospace;
      --sans:    'Inter', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      padding-bottom: 80px;
      line-height: 1.5;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 24px 32px;
    }
    header h1 {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .container { max-width: 860px; margin: 0 auto; padding: 0 24px; }

    .section-label {
      font-family: var(--mono);
      font-size: .68rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .12em;
      margin-bottom: 12px;
      padding-top: 32px;
    }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

    @media (max-width: 600px) {
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 18px;
    }
    .card label {
      display: block;
      font-size: .72rem;
      color: var(--muted);
      margin-bottom: 7px;
      font-weight: 500;
    }
    .card input, .card select {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--mono);
      font-size: .95rem;
      padding: 9px 12px;
      outline: none;
    }
    .card input:focus, .card select:focus {
      border-color: var(--green-dim);
    }
    .card input::placeholder { color: var(--muted); }
    .card .hint { font-size: .68rem; color: var(--muted); margin-top: 5px; }

    /* Log table */
    .log-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .log-header {
      display: grid;
      grid-template-columns: 100px 1fr 1fr 1fr;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .log-header span {
      font-size: .65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .07em;
      font-weight: 500;
      padding: 9px 12px;
      text-align: center;
    }
    .log-header span:first-child { text-align: left; padding-left: 14px; }
    .log-header small { display: block; font-size: .6rem; opacity: .7; text-transform: none; letter-spacing: 0; }

    .log-row {
      display: grid;
      grid-template-columns: 100px 1fr 1fr 1fr;
      border-bottom: 1px solid var(--border);
    }
    .log-row:last-child { border-bottom: none; }
    .log-row .day-label {
      font-family: var(--mono);
      font-size: .72rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      padding: 0 8px 0 14px;
      white-space: nowrap;
    }
    .log-row input {
      border: none;
      border-left: 1px solid var(--border);
      border-radius: 0;
      background: transparent;
      color: var(--text);
      font-family: var(--mono);
      font-size: .88rem;
      padding: 10px 12px;
      text-align: center;
      outline: none;
      width: 100%;
    }
    .log-row input:focus { background: rgba(0,230,118,.04); }
    .log-row input::placeholder { color: #3a4a66; font-size: .78rem; }

    /* Button */
    .calc-btn {
      margin-top: 28px;
      width: 100%;
      background: var(--green);
      border: none;
      border-radius: 8px;
      color: #000;
      font-family: var(--sans);
      font-size: .95rem;
      font-weight: 600;
      padding: 16px;
      cursor: pointer;
      letter-spacing: .03em;
      text-transform: uppercase;
    }
    .calc-btn:hover { background: #00c060; }

    /* Results */
    #results { display: none; margin-top: 36px; }

    .big-stat {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px 28px;
      margin-bottom: 12px;
    }
    .big-stat .label { font-size: .72rem; color: var(--muted); margin-bottom: 6px; }
    .big-stat .num {
      font-family: var(--mono);
      font-size: 2.6rem;
      font-weight: 700;
      line-height: 1;
    }
    .big-stat .num.v-green { color: var(--green); }
    .big-stat .num.v-red   { color: var(--red); }
    .big-stat .sub { font-size: .82rem; color: var(--muted); margin-top: 8px; }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
    }
    .stat-card .l {
      font-size: .65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      font-weight: 500;
      margin-bottom: 5px;
    }
    .stat-card .v { font-family: var(--mono); font-size: 1.2rem; font-weight: 700; }
    .v-green { color: var(--green); }
    .v-red   { color: var(--red); }
    .v-amber { color: var(--amber); }

    .breakdown {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .breakdown-title {
      font-family: var(--mono);
      font-size: .65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .1em;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
    }
    .breakdown-row {
      display: flex;
      justify-content: space-between;
      padding: 9px 16px;
      border-bottom: 1px solid var(--border);
      font-size: .83rem;
    }
    .breakdown-row:last-child { border-bottom: none; }
    .breakdown-row .bk { color: var(--muted); }
    .breakdown-row .bv { font-family: var(--mono); font-weight: 700; }

    .toggle-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .toggle-btn {
      flex: 1;
      padding: 8px;
      border: 1px solid var(--border);
      background: var(--card);
      border-radius: 6px;
      color: var(--muted);
      font-family: var(--sans);
      font-size: .82rem;
      font-weight: 500;
      cursor: pointer;
    }
    .toggle-btn.active {
      border-color: var(--green-dim);
      color: var(--green);
    }

    .proj-chart {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 18px;
    }
    .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
    .bar-row:last-child { margin-bottom: 0; }
    .bar-day { font-family: var(--mono); font-size: .7rem; color: var(--muted); min-width: 38px; }
    .bar-track { flex: 1; height: 7px; background: var(--surface); border-radius: 4px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; }
    .bar-val { font-family: var(--mono); font-size: .72rem; min-width: 68px; text-align: right; }
  </style>
</head>
<body>

<header>
  <h1>Fat Loss Tracker</h1>
</header>

<div class="container">

  <div class="section-label">Body stats</div>
  <div class="grid-3" style="margin-bottom:10px">
    <div class="card">
      <label>Sex</label>
      <select id="sex">
        <option value="male">Male</option>
        <option value="female">Female</option>
      </select>
    </div>
    <div class="card">
      <label>Age</label>
      <input type="number" id="age" placeholder="30" min="14" max="99" />
    </div>
    <div class="card">
      <label>Units</label>
      <select id="units">
        <option value="lbs">Pounds / inches</option>
        <option value="kg">Kilograms / cm</option>
      </select>
    </div>
  </div>
  <div class="grid-2">
    <div class="card">
      <label id="wLabel">Weight (lbs)</label>
      <input type="number" id="weight" placeholder="185" step="0.1" />
    </div>
    <div class="card">
      <label id="hLabel">Height (inches)</label>
      <input type="number" id="height" placeholder="70" step="0.5" />
      <div class="hint">e.g. 5′10″ = 70</div>
    </div>
  </div>

  <div class="section-label">Daily log</div>
  <div class="log-card">
    <div class="log-header">
      <span>Day</span>
      <span>Calories eaten<small>from MFP</small></span>
      <span>Steps<small>from watch</small></span>
      <span>Exercise cal<small>MFP exercise log</small></span>
    </div>
    <div id="logBody"></div>
  </div>

  <button class="calc-btn" id="calcBtn">Calculate →</button>

  <div id="results">

    <div class="section-label">Results</div>

    <div class="big-stat">
      <div class="label">Estimated fat burned this week</div>
      <div class="num" id="bigNum">—</div>
      <div class="sub" id="bigSub">—</div>
    </div>

    <div class="stats-grid">
      <div class="stat-card"><div class="l">Avg calories eaten</div><div class="v v-amber" id="avgIn">—</div></div>
      <div class="stat-card"><div class="l">Avg calories burned</div><div class="v" id="avgOut">—</div></div>
      <div class="stat-card"><div class="l">Avg daily deficit</div><div class="v" id="avgDef">—</div></div>
      <div class="stat-card"><div class="l">Projected / month</div><div class="v v-green" id="monthFat">—</div></div>
    </div>

    <div class="breakdown">
      <div class="breakdown-title">Calculation breakdown</div>
      <div id="breakdownRows"></div>
    </div>

    <div class="section-label">Projection</div>
    <div class="toggle-row">
      <button class="toggle-btn active" id="p7btn">7 days</button>
      <button class="toggle-btn" id="p30btn">30 days</button>
    </div>
    <div class="proj-chart" id="projChart"></div>

  </div>

</div>

<script>
  const FAT_KCAL_PER_LB = 3500;
  let currentStats = null;
  let currentUnit  = 'lbs';

  // ── Init ──
  document.addEventListener('DOMContentLoaded', () => {
    initLog();
    document.getElementById('units').addEventListener('change', function () {
      const isKg = this.value === 'kg';
      currentUnit = this.value;
      document.getElementById('wLabel').textContent = isKg ? 'Weight (kg)'    : 'Weight (lbs)';
      document.getElementById('hLabel').textContent = isKg ? 'Height (cm)'    : 'Height (inches)';
      document.getElementById('weight').placeholder = isKg ? '84'             : '185';
      document.getElementById('height').placeholder = isKg ? '178'            : '70';
      document.querySelector('.hint').textContent   = isKg ? 'e.g. 178 cm'    : 'e.g. 5′10″ = 70';
    });
    document.getElementById('calcBtn').addEventListener('click', calculate);
    document.getElementById('p7btn').addEventListener('click',  () => showProj(7));
    document.getElementById('p30btn').addEventListener('click', () => showProj(30));
  });

  // ── Log ──
  function initLog() {
    const body = document.getElementById('logBody');
    for (let i = 6; i >= 0; i--) {
      const d = new Date();
      d.setDate(d.getDate() - i);
      const label = d.toLocaleDateString('en-US', { weekday: 'short', month: 'numeric', day: 'numeric' });
      const row = document.createElement('div');
      row.className = 'log-row';
      row.innerHTML = `
        <div class="day-label">${label}</div>
        <input type="number" class="cal-in" placeholder="e.g. 1800" min="0" />
        <input type="number" class="steps"  placeholder="e.g. 8000" min="0" />
        <input type="number" class="ex-cal" placeholder="e.g. 0"    min="0" />
      `;
      body.appendChild(row);
    }
  }

  // ── Math ──
  function calcBMR(weightLbs, heightIn, age, sex) {
    const kg = weightLbs * 0.453592;
    const cm = heightIn * 2.54;
    const base = 10 * kg + 6.25 * cm - 5 * age;
    return sex === 'male' ? base + 5 : base - 161;
  }

  function stepsToKcal(steps, weightLbs) {
    return steps * (weightLbs / 150) * 0.04;
  }

  // ── Calculate ──
  function calculate() {
    const units = document.getElementById('units').value;
    const isKg  = units === 'kg';
    const rawW  = parseFloat(document.getElementById('weight').value) || 0;
    const rawH  = parseFloat(document.getElementById('height').value) || 0;
    const age   = parseFloat(document.getElementById('age').value)    || 30;
    const sex   = document.getElementById('sex').value;

    if (!rawW || !rawH) { alert('Enter your weight and height.'); return; }

    const weightLbs = isKg ? rawW / 0.453592 : rawW;
    const heightIn  = isKg ? rawH / 2.54      : rawH;
    const bmr       = calcBMR(weightLbs, heightIn, age, sex);

    const rows   = document.querySelectorAll('#logBody .log-row');
    const days   = [];
    rows.forEach(row => {
      const calIn = parseFloat(row.querySelector('.cal-in').value) || 0;
      const steps = parseFloat(row.querySelector('.steps').value)  || 0;
      const exCal = parseFloat(row.querySelector('.ex-cal').value) || 0;
      if (calIn === 0 && steps === 0) return;
      const stepsKcal = stepsToKcal(steps, weightLbs);
      const tdee      = bmr * 1.2 + stepsKcal + exCal;
      days.push({ calIn, steps, exCal, stepsKcal, tdee, deficit: tdee - calIn });
    });

    if (!days.length) { alert('Fill in at least one day.'); return; }

    const n            = days.length;
    const avgDeficit   = days.reduce((s,d) => s + d.deficit,   0) / n;
    const avgIn        = days.reduce((s,d) => s + d.calIn,     0) / n;
    const avgOut       = days.reduce((s,d) => s + d.tdee,      0) / n;
    const avgStepsKcal = days.reduce((s,d) => s + d.stepsKcal, 0) / n;
    const avgExKcal    = days.reduce((s,d) => s + d.exCal,     0) / n;
    const avgSteps     = days.reduce((s,d) => s + d.steps,     0) / n;
    const fatLbs7      = (avgDeficit * 7)  / FAT_KCAL_PER_LB;
    const fatLbs30     = (avgDeficit * 30) / FAT_KCAL_PER_LB;
    const fatPerDay    = avgDeficit / FAT_KCAL_PER_LB;

    currentStats = { bmr, avgDeficit, avgIn, avgOut, avgStepsKcal, avgExKcal, avgSteps, fatLbs7, fatLbs30, fatPerDay, n };
    currentUnit  = units;

    // Render
    const fmt = lbs => isKg ? (lbs * 0.453592).toFixed(2) + ' kg' : lbs.toFixed(2) + ' lbs';
    const pos  = fatLbs7 >= 0;

    document.getElementById('bigNum').textContent = fmt(Math.abs(fatLbs7));
    document.getElementById('bigNum').className   = 'num ' + (pos ? 'v-green' : 'v-red');
    document.getElementById('bigSub').textContent = pos
      ? `Avg deficit: ${Math.round(avgDeficit)} kcal/day over ${n} days logged.`
      : `Avg surplus: ${Math.abs(Math.round(avgDeficit))} kcal/day — currently gaining, not losing.`;

    document.getElementById('avgIn').textContent  = Math.round(avgIn)  + ' kcal';
    document.getElementById('avgOut').textContent = Math.round(avgOut) + ' kcal';
    const defEl = document.getElementById('avgDef');
    defEl.textContent = (pos ? '−' : '+') + Math.abs(Math.round(avgDeficit)) + ' kcal';
    defEl.className   = 'v ' + (pos ? 'v-green' : 'v-red');
    document.getElementById('monthFat').textContent = fmt(Math.abs(fatLbs30));

    document.getElementById('breakdownRows').innerHTML = [
      ['BMR (Mifflin-St Jeor)',                                    Math.round(bmr) + ' kcal'],
      ['× Sedentary base (1.2)',                                   Math.round(bmr * 1.2) + ' kcal'],
      [`+ NEAT from steps (~${Math.round(avgSteps).toLocaleString()}/day)`, '+' + Math.round(avgStepsKcal) + ' kcal'],
      ['+ Exercise logged (avg)',                                   '+' + Math.round(avgExKcal) + ' kcal'],
      ['= Avg total burn (TDEE)',                                   Math.round(avgOut) + ' kcal'],
      ['− Avg calories eaten',                                     '−' + Math.round(avgIn) + ' kcal'],
      ['= Daily deficit',                                          (pos ? '−' : '+') + Math.abs(Math.round(avgDeficit)) + ' kcal'],
      ['÷ 3,500 kcal/lb × 7',                                     fmt(Math.abs(fatLbs7)) + ' / week'],
    ].map(([k,v]) => `<div class="breakdown-row"><span class="bk">${k}</span><span class="bv">${v}</span></div>`).join('');

    document.getElementById('results').style.display = 'block';
    document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
    showProj(7);
  }

  // ── Projection ──
  function showProj(days) {
    if (!currentStats) return;
    document.getElementById('p7btn').className  = 'toggle-btn' + (days === 7  ? ' active' : '');
    document.getElementById('p30btn').className = 'toggle-btn' + (days === 30 ? ' active' : '');

    const isKg     = currentUnit === 'kg';
    const fmt      = lbs => isKg ? (lbs * 0.453592).toFixed(2) + ' kg' : lbs.toFixed(2) + ' lbs';
    const { fatPerDay } = currentStats;
    const step     = days <= 7 ? 1 : 3;
    const points   = [];
    for (let d = step; d <= days; d += step) points.push(d);
    const values   = points.map(d => fatPerDay * d);
    const maxAbs   = Math.max(...values.map(Math.abs), 0.01);

    document.getElementById('projChart').innerHTML = points.map((d, i) => {
      const v    = values[i];
      const pct  = (Math.abs(v) / maxAbs * 100).toFixed(1);
      const col  = v >= 0 ? 'var(--green)' : 'var(--red)';
      const sign = v < 0 ? '+' : '−';
      return `<div class="bar-row">
        <span class="bar-day">Day ${d}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${col}"></div></div>
        <span class="bar-val" style="color:${col}">${sign}${fmt(Math.abs(v))}</span>
      </div>`;
    }).join('');
  }
</script>
</body>
</html>
